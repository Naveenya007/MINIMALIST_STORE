<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Minimalist Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">minimalist</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html" class="cart-link">Cart <span class="cart-badge" data-cart-count="0">0</span></a></li>
                <li id="user-menu" style="display: none;">
                    <a href="#" onclick="logout(); return false;">Logout</a>
                </li>
                <li id="auth-menu">
                    <a href="signup.html">Sign Up</a>
                </li>
            </ul>
        </div>
    </nav>

    

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Login to your account</p>

                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" required placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" required placeholder="Your password">
                    </div>

                    <div id="login-message" class="status-message" aria-live="polite"></div>

                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <p class="auth-toggle">Don't have an account? <a href="signup.html">Sign up here</a></p>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js?v=2"></script>
    <script>
        $(document).ready(function() {
        Promise.resolve(window.minimalistStoreAuth.checkSession()).then(function(session) {
            if (session.loggedIn) {
                window.location.href = 'products.html';
            }
        });

            $('#login-form').on('submit', function(e) {
                e.preventDefault();

                const formData = {
                    email: $('#login-email').val(),
                    password: $('#login-password').val()
                };

                window.minimalistStoreAuth.login(formData)
                    .then(function(response) {
                        if (response.success) {
                            $('#login-message').html('<p class="success">✓ ' + response.message + '</p>');
                            setTimeout(() => {
                                window.location.href = 'products.html';
                            }, 1500);
                        } else {
                            $('#login-message').html('<p class="error">✗ ' + response.message + '</p>');
                        }
                    })
                    .catch(function(error) {
                        const message = error && error.message ? error.message : 'Login failed';
                        $('#login-message').html('<p class="error">✗ ' + message + '</p>');
                    });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Minimalist Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">minimalist</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html" class="cart-link">Cart <span class="cart-badge" data-cart-count="0">0</span></a></li>
                <li id="user-menu" style="display: none;">
                    <a href="#" onclick="logout(); return false;">Logout</a>
                </li>
                <li id="auth-menu">
                    <a href="login.html">Login</a>
                </li>
            </ul>
        </div>
    </nav>

    

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <h1>Create Account</h1>
                <p class="auth-subtitle">Join minimalist and start shopping</p>

                <form id="signup-form" class="auth-form">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" name="name" required placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="email" required placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" required placeholder="At least 6 characters">
                    </div>

                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" name="confirmPassword" required placeholder="Confirm your password">
                    </div>

                    <div id="signup-message" class="status-message" aria-live="polite"></div>

                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>

                <p class="auth-toggle">Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        $(document).ready(function() {
            const session = window.minimalistStoreAuth.checkSession();
            if (session.loggedIn) {
                window.location.href = 'products.html';
                return;
            }

            $('#signup-form').on('submit', function(e) {
                e.preventDefault();

                const formData = {
                    name: $('#signup-name').val(),
                    email: $('#signup-email').val(),
                    password: $('#signup-password').val(),
                    confirmPassword: $('#signup-confirm').val()
                };

                window.minimalistStoreAuth.signup(formData)
                    .then(function(response) {
                        $('#signup-message').html('<p class="success">✓ ' + response.message + '</p>');
                        setTimeout(() => {
                            window.location.href = 'products.html';
                        }, 1500);
                    })
                    .catch(function(error) {
                        const message = error && error.message ? error.message : 'Signup failed';
                        $('#signup-message').html('<p class="error">✗ ' + message + '</p>');
                    });
            });
        });
    </script>
</body>
</html>

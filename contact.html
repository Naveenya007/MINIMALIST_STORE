<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact / Order</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">minimalist</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="cart-link">Cart <span class="cart-badge" data-cart-count="0">0</span></a></li>
      <li id="user-menu" style="display: none;">
        <a href="#" onclick="logout(); return false;">Logout</a>
      </li>
      <li id="auth-menu">
        <a href="login.html">Login</a> / <a href="signup.html">Sign Up</a>
      </li>
    </ul>
  </div>
</nav>



<header>
  <h1>Contact Us</h1>
</header>

<section class="contact-panel">

  <!-- Contact Number -->
  <h2>Order via Phone</h2>
  <p style="font-size:20px; margin:20px 0;">
      Call or WhatsApp: <strong>9975844536</strong>
  </p>
  <p>Available: 9:00 AM – 8:00 PM</p>

  <hr class="section-divider">

  <!-- Order Form -->
  <h2>Place Your Order</h2>

  <form id="contact-form" class="stack-form">
    
    <input 
      type="text" 
      placeholder="Your Name" 
      required
      id="contact-name"
    >

    <input 
      type="email" 
      placeholder="Your Email" 
      required
      id="contact-email"
    >

    <textarea 
      placeholder="Enter product name and quantity..."
      required
      id="contact-message"
    ></textarea>

    <button type="submit">Send Order Request</button>
    <p id="contact-status" class="status-message" aria-live="polite"></p>

  </form>
</section>

<footer>
  <p>Minimalist Lifestyle Store | Contact: 9975844536</p>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/app.js?v=1"></script>


</body>
</html>
